name: Dockerize

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  dockerize:
    uses: specify/workflows/.github/workflows/dockerize.yml@main
    with:
      registry-service: specifyconsortium/specify-asset-service
    secrets:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

